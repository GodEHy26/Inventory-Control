<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Inventory Control — Oriental Fasteners</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>
<div id="login" class="login hidden">
  <form id="loginForm" class="login-card">
    <div class="brand"><span class="hex"></span>INVENTORY CONTROL</div>
    <p class="muted">Multi-warehouse fastener stock, assemblies &amp; manufacturing</p>
    <label>Username <input name="username" autocomplete="username" required></label>
    <label>Password <input name="password" type="password" autocomplete="current-password" required></label>
    <button class="btn primary" type="submit">Sign in</button>
    <p id="loginErr" class="err"></p>
  </form>
</div>

<div id="app" class="hidden">
  <aside class="rail">
    <div class="brand"><span class="hex"></span>INVENTORY<br>CONTROL</div>
    <nav id="nav">
      <button data-tab="dashboard" class="active">Dashboard</button>
      <button data-tab="stock">Stock</button>
      <button data-tab="so">Sales orders</button>
      <button data-tab="po">Incoming</button>
      <button data-tab="mfg">Manufacturing</button>
      <button data-tab="reports">Reports</button>
    </nav>
    <div class="rail-foot">
      <div id="whoami" class="muted"></div>
      <button id="logout" class="btn ghost small">Sign out</button>
      <div id="liveDot" class="live"><span></span> live</div>
    </div>
  </aside>
  <main id="main"></main>
</div>

<div id="drawer" class="drawer hidden"><div class="drawer-inner" id="drawerBody"></div></div>
<div id="toasts"></div>
<script src="/socket.io/socket.io.js"></script>
<script src="app.js"></script>
</body>
</html>
